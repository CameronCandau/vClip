name: publish-pypi

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate release version
        run: |
          python - <<'PY'
          import pathlib
          import re
          import tomllib

          root = pathlib.Path(".")
          tag = "${{ github.ref_name }}"
          if not re.fullmatch(r"v\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?", tag):
              raise SystemExit(f"Release tag must match v<semver>, got: {tag}")

          tag_version = tag[1:]
          pyproject = tomllib.loads((root / "pyproject.toml").read_text())
          package_version = pyproject["project"]["version"]

          init_text = (root / "cmd_manager" / "__init__.py").read_text()
          match = re.search(r'__version__\s*=\s*"([^"]+)"', init_text)
          if not match:
              raise SystemExit("Could not find __version__ in cmd_manager/__init__.py")
          module_version = match.group(1)

          if package_version != module_version:
              raise SystemExit(
                  "Version mismatch between pyproject.toml "
                  f"({package_version}) and cmd_manager/__init__.py ({module_version})"
              )

          if tag_version != package_version:
              raise SystemExit(
                  f"Tag version {tag_version} does not match package version {package_version}"
              )

          print(f"Validated release tag {tag} against package version {package_version}")
          PY

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pytest
          python -m pip install .

      - name: Run tests
        run: python -m pytest tests/

      - name: Build distributions
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
