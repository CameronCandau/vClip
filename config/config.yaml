# vclip configuration file
# This is the default configuration for the command snippet manager

# Source configuration - where to find markdown files
sources:
  # Explicit file paths
  files: []

  # Directories to search for markdown files
  directories:
    - "~/Documents/commands"
    - "~/.local/share/vclip"

  # Search directories recursively
  recursive: true

  # File patterns to match
  file_patterns:
    - "*.md"
    - "*.markdown"

# Rofi interface configuration
rofi:
  # Additional arguments to pass to rofi
  args: []

  # Use pango markup for formatting
  use_markup: true

  # Maximum number of lines to show
  max_lines: 15

  # Prompt text
  prompt: "Commands"

  # Window width as percentage of screen (0-100)
  window_width: 60

  # Element height (lines per entry - use 2 for two-line format with command preview)
  element_height: 1

# Cache configuration
cache:
  # Enable caching for faster startup
  enabled: true

  # Cache directory (null means use default: ~/.cache/vclip)
  directory: null

  # Automatically clean up invalid cache files
  auto_cleanup: true

# Copy commands exactly as written by default.
# Toggle this inside the rofi menu via the "[Settings] Variable substitution" entry.
substitute_variables: false

# Variable definitions for command substitution
# Variables defined here are substituted silently — never prompted.
# Variables NOT listed here will trigger a rofi prompt when a command uses them,
# pre-filled from the last-used value in ~/.cache/vclip/vars.json.
#
# Common pre-defines (set these to your VPN/lab IP and wordlist path):
variables:
  # LHOST: "10.10.14.5"
  # WORDLIST: "/usr/share/wordlists/rockyou.txt"
